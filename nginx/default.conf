# =====================================================
# Nginx config — Viet-Contech static site
# Toi uu: gzip, cache headers theo loai file, SPA fallback
# =====================================================

# Gzip — bat moi noi, level 6 can bang CPU/network
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  text/xml
  application/javascript
  application/json
  application/xml
  application/xml+rss
  application/manifest+json
  application/x-web-app-manifest+json
  image/svg+xml
  font/woff2;

# Brotli — chi enable neu Nginx build co module
# (nginx:alpine mac dinh KHONG co — uncomment neu doi sang openresty/nginx-brotli)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/javascript application/json image/svg+xml;

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Tat server tokens (giau version Nginx)
  server_tokens off;

  # Security headers — phong injection co ban
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Healthcheck endpoint
  location = /healthz {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }

  # =====================================================
  # Cache headers theo loai asset
  # =====================================================

  # HTML — cache ngan (1h) de update content nhanh
  location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
  }

  # Service worker — KHONG cache (phai update lien tuc)
  location = /sw.js {
    expires off;
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  # Manifest — cache ngan
  location = /manifest.webmanifest {
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
    add_header Content-Type application/manifest+json;
  }

  # Static assets (PNG, JPG, ICO, CSS, JS, font) — cache lau 30 ngay + immutable
  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|css|js|woff2|woff|ttf|otf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    access_log off;
  }

  # XML/TXT (sitemap, robots) — cache trung binh 1 ngay
  location ~* \.(xml|txt)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  # =====================================================
  # SPA fallback — moi route khong tim thay file -> index.html
  # Phong khi sau nay add client-side routing
  # =====================================================
  location / {
    try_files $uri $uri/ $uri.html /index.html;
  }

  # Khong cho phep truy cap dotfiles (.git, .env)
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
