<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow,nosnippet,noarchive,noimageindex"/>

<title>VIET CONTECH · Internal Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090C;color:#EDE8DC;font-family:Tahoma,Verdana,Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate{background:linear-gradient(135deg,#0C1016,#0A0700);border:1px solid rgba(196,147,58,.22);border-radius:14px;padding:42px 38px;max-width:420px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:26px}
.logo-hex{display:inline-flex;width:54px;height:54px;border:2px solid #C4933A;border-radius:50%;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:26px;font-weight:700;color:#C4933A;margin-bottom:12px}
.brand{font-family:Georgia,serif;font-size:20px;font-weight:700;letter-spacing:.18em;background:linear-gradient(135deg,#B47855,#F2CCB0 50%,#B47855);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tag{font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:#8A8070;margin-top:6px}
h1{font-family:Georgia,serif;font-size:18px;font-weight:600;color:#EDE8DC;margin-bottom:8px;text-align:center}
.sub{font-size:11px;color:#8A8070;line-height:1.6;text-align:center;margin-bottom:24px}
.fld{margin-bottom:14px}
.lbl{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#50483C;margin-bottom:6px;font-weight:600}
.inp{width:100%;padding:12px 14px;background:rgba(0,0,0,.4);border:1px solid rgba(196,147,58,.22);border-radius:6px;color:#EDE8DC;font-size:14px;font-family:inherit;outline:none;transition:border .25s}
.inp:focus{border-color:#C4933A;background:rgba(0,0,0,.6)}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#B47855,#E8B89A);color:#0A0700;border:none;border-radius:6px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:11px;cursor:pointer;transition:transform .25s,box-shadow .25s;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(180,120,85,.4)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.err{color:#E54B4B;font-size:11px;margin-top:10px;text-align:center;min-height:14px}
.foot{margin-top:22px;padding-top:18px;border-top:1px solid rgba(196,147,58,.1);font-size:9.5px;color:#3A2E1E;text-align:center;line-height:1.6}
.foot strong{color:#8A8070}
.lock-icon{font-size:38px;margin-bottom:14px;text-align:center}
@media(max-width:480px){.gate{padding:32px 22px}}
</style>
</head>
<body>
<div class="gate">
  <div class="logo">
    <div class="logo-hex">V</div>
    <div class="brand">VIET CONTECH</div>
    <div class="tag">Internal Design Portal</div>
  </div>
  <div class="lock-icon">🔒</div>
  <h1>Authentication Required</h1>
  <div class="sub">Cổng nội bộ. Truy cập trái phép sẽ bị ghi log + truy tố theo NDA đã ký.</div>
  <form id="gate-form" autocomplete="off">
    <div class="fld">
      <label class="lbl">Mã truy cập (Access Code)</label>
      <input class="inp" id="pwd" type="password" autocomplete="off" autofocus required minlength="8" maxlength="64"/>
    </div>
    <button class="btn" id="submit-btn" type="submit">Mở khóa →</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">
    © 2025 VIET CONTECH<br/>
    <strong>Authorized personnel only.</strong> All access is logged.<br/>
    Quên mã? Liên hệ <strong>cto@vietcontech.com</strong>
  </div>

    if (!pwd) return;
    btnEl.disabled = true;
    btnEl.textContent = 'Đang xác thực...';
    errEl.textContent = '';

    // Verify hash trước (UX feedback nhanh)
    const hashBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if (hashHex !== VERIFY_HASH) {
      attempts++;
      errEl.textContent = `✗ Mã không đúng. Còn ${MAX_ATTEMPTS - attempts} lần thử.`;
      btnEl.disabled = false;
      btnEl.textContent = 'Mở khóa →';
      pwdEl.value = '';
      pwdEl.focus();
      // Log fail attempt (background, không block UI)
      fetch('/api/audit/log-fail', {method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({event:'portal_auth_fail',ts:Date.now()})}).catch(()=>{});
      return;
    }

    // Decrypt blob (crypto-js OpenSSL format: Salted__ + 8byte salt + ciphertext)
    try {
      const decrypted = CryptoJS.AES.decrypt(BLOB, pwd);
      const html = decrypted.toString(CryptoJS.enc.Utf8);
      if (!html || !html.startsWith('<!DOCTYPE') && !html.startsWith('<html') && !html.includes('<head')) {
        throw new Error('decrypt_failed');
      }
      // Reveal: replace document
      document.open();
      document.write(html);
      document.close();
    } catch (err) {
      errEl.textContent = '✗ Giải mã thất bại. Liên hệ admin.';
      btnEl.disabled = false;
      btnEl.textContent = 'Mở khóa →';
      console.error('decrypt error:', err);
    }
  });
})();
</script>
</body>
</html>
